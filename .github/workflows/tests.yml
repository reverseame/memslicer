name: tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        # emu + graph install cleanly and fast and cover the bulk of the suite.
        # The angr (symbex) and Speakeasy tests self-skip via importorskip when
        # those (heavier / git-sourced) extras are absent; add 'symbex' and
        # 'speakeasy' here to exercise them in CI too.
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev,emu,graph]'

      - name: Lint
        run: ruff check src tests

      - name: Run tests
        run: pytest -q
